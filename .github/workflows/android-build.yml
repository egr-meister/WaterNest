name: Android Build (WaterNest)

# Fast, stable release APK/AAB build and signing only.
# No emulator smoke-tests on free runners.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependencies
        run: npx expo install --fix

      - name: Run expo-doctor
        run: npx expo-doctor || true

      - name: Check Expo dependency versions
        run: npx expo install --check || true

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore from secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore/waternest-release-key.p12

      - name: Configure signing (gradle.properties)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "WATERNEST_STORE_FILE=keystore/waternest-release-key.p12"
            echo "WATERNEST_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "WATERNEST_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "WATERNEST_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Inject release signing config into build.gradle
        run: |
          python3 - <<'PY'
          import re, io, os
          path = "android/app/build.gradle"
          with io.open(path, "r", encoding="utf-8") as f:
              gradle = f.read()

          signing_block = """
            signingConfigs {
                release {
                    if (project.hasProperty('WATERNEST_STORE_FILE')) {
                        storeFile file(WATERNEST_STORE_FILE)
                        storePassword WATERNEST_STORE_PASSWORD
                        keyAlias WATERNEST_KEY_ALIAS
                        keyPassword WATERNEST_KEY_PASSWORD
                        storeType "PKCS12"
                    }
                }
            }
          """

          # Insert signingConfigs right after "android {" (first occurrence).
          if "WATERNEST_STORE_FILE" not in gradle:
              gradle = re.sub(r"android\\s*\\{", "android {\\n" + signing_block, gradle, count=1)

          # Point the release buildType at the release signing config.
          gradle = gradle.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release",
          )

          with io.open(path, "w", encoding="utf-8") as f:
              f.write(gradle)
          print("Patched", path)
          PY

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waternest-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: waternest-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
